<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Calc v7 - Type Fixed</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #3b82f6; --orange: #f59e0b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        #result { margin-top: 15px; padding: 15px; background: #000; border-radius: 10px; border: 2px solid var(--orange); }
        .desc { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h2>攻撃側 (Attacker)</h2>
    <div class="grid">
        <div><div class="label">本体タイプ</div><select id="atk_type"><option value="Normal">Normal</option><option value="Fire">Fire</option><option value="Water">Water</option><option value="Grass">Grass</option><option value="Electric">Electric</option><option value="Ice">Ice</option><option value="Fighting">Fighting</option><option value="Poison">Poison</option><option value="Ground">Ground</option><option value="Flying">Flying</option><option value="Psychic">Psychic</option><option value="Bug">Bug</option><option value="Rock">Rock</option><option value="Ghost">Ghost</option><option value="Dragon">Dragon</option><option value="Dark">Dark</option><option value="Steel">Steel</option><option value="Fairy">Fairy</option></select></div>
        <div><div class="label">テラス</div><select id="atk_tera"><option value="">None</option><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select></div>
        <div><div class="label">攻撃実数値</div><input type="number" id="atk_stat" value="100"></div>
        <div><div class="label">ランク</div><select id="atk_boost"><option value="6">+6</option><option value="0" selected>±0</option><option value="-6">-6</option></select></div>
    </div>
</div>

<div class="card">
    <h2>わざ (Move)</h2>
    <div class="grid">
        <div><div class="label">わざタイプ</div><select id="move_type"><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select></div>
        <div><div class="label">分類</div><select id="move_cat"><option value="Physical">Physical</option><option value="Special">Special</option></select></div>
        <div style="grid-column: span 2;"><div class="label">威力</div><input type="number" id="move_bp" value="80"></div>
    </div>
</div>

<div class="card">
    <h2>防御側 (Defender)</h2>
    <div class="grid">
        <div><div class="label">HP実数値</div><input type="number" id="def_hp" value="175"></div>
        <div><div class="label">防御実数値</div><input type="number" id="def_stat" value="100"></div>
        <div><div class="label">タイプ1</div><select id="def_type1"><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select></div>
        <div><div class="label">タイプ2</div><select id="def_type2"><option value="">None</option><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select></div>
    </div>
</div>

<button id="calcBtn">ダメージ計算実行</button>
<div id="result">結果が表示されます</div>

<script type="module">
    let calc, P, M, F;
    async function init() {
        const mod = await import('https://cdn.skypack.dev/@smogon/calc');
        calc = mod.calculate; P = mod.Pokemon; M = mod.Move; F = mod.Field;
    }
    window.onload = init;

    document.getElementById('calcBtn').onclick = () => {
        if (!calc) return;
        const v = (id) => document.getElementById(id).value;
        const n = (id) => parseInt(document.getElementById(id).value) || 0;
        const isPhys = v('move_cat') === 'Physical';

        try {
            // 1. 各オブジェクトの生成
            const move = new M(9, 'Tackle', { bp: n('move_bp') });
            const attacker = new P(9, 'Arceus', { level: 50 });
            const defender = new P(9, 'Arceus', { level: 50 });
            const field = new F({ gameType: 'Doubles' });

            // 2. 攻撃側のタイプ設定 (STAB一致補正のため)
            attacker.types = [v('atk_type')];
            if (v('atk_tera')) attacker.teraType = v('atk_tera');
            attacker.stats[isPhys ? 'atk' : 'spa'] = n('atk_stat');
            attacker.boosts[isPhys ? 'atk' : 'spa'] = n('atk_boost');

            // 3. 防御側のタイプ設定 (相性補正のため)
            const defTypes = [v('def_type1')];
            if (v('def_type2')) defTypes.push(v('def_type2'));
            defender.types = defTypes;
            defender.stats.hp = n('def_hp');
            defender.stats[isPhys ? 'def' : 'spd'] = n('def_stat');

            // 4. 技のタイプ設定 (CustomMove化して自動補正を無効化)
            move.name = 'CustomMove';
            move.type = v('move_type');
            move.category = v('move_cat');

            // 5. 計算実行
            const result = calc(9, attacker, defender, move, field);
            const d = result.damage;
            const min = Array.isArray(d) ? d[0] : d;
            const max = Array.isArray(d) ? d[d.length - 1] : d;
            const hp = n('def_hp') || 1;

            document.getElementById('result').innerHTML = 
                `<div style="font-size:24px; font-weight:bold;">${min} 〜 ${max}</div>` +
                `<div style="font-size:18px; color:var(--orange); font-weight:bold;">${((min/hp)*100).toFixed(1)}% 〜 ${((max/hp)*100).toFixed(1)}%</div>` +
                `<div class="desc">${result.desc()}</div>`;

        } catch (e) { document.getElementById('result').innerText = "エラー: " + e.message; }
    };
</script>
</body>
</html>
