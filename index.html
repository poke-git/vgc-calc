<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Calc v0.010</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #3b82f6; --orange: #f59e0b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .version { position: fixed; top: 5px; right: 10px; font-size: 10px; color: #666; z-index: 100; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        #result { margin-top: 15px; padding: 15px; background: #000; border-radius: 10px; border: 2px solid var(--orange); min-height: 80px; }
        .desc { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="version">v0.010</div>

<div class="card">
    <h2>攻撃側</h2>
    <div class="grid">
        <div><div class="label">本体タイプ</div><select id="atk_type"></select></div>
        <div><div class="label">攻撃実数値</div><input type="number" id="atk_stat" value="202"></div>
        <div style="grid-column: span 2;">
            <div class="label">ランク補正</div>
            <select id="atk_boost">
                <option value="6">+6</option><option value="5">+5</option><option value="4">+4</option><option value="3">+3</option><option value="2">+2</option><option value="1">+1</option>
                <option value="0" selected>±0</option>
                <option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="-4">-4</option><option value="-5">-5</option><option value="-6">-6</option>
            </select>
        </div>
    </div>
</div>

<div class="card">
    <h2>わざ</h2>
    <div class="grid">
        <div><div class="label">わざタイプ</div><select id="move_type"></select></div>
        <div><div class="label">分類</div><select id="move_cat"><option value="Physical">物理</option><option value="Special">特殊</option></select></div>
        <div style="grid-column: span 2;"><div class="label">威力</div><input type="number" id="move_bp" value="100"></div>
    </div>
</div>

<div class="card">
    <h2>防御側</h2>
    <div class="grid">
        <div><div class="label">タイプ1</div><select id="def_type1"></select></div>
        <div><div class="label">タイプ2</div><select id="def_type2"><option value="">なし</option></select></div>
        <div><div class="label">HP実数値</div><input type="number" id="def_hp" value="175"></div>
        <div><div class="label">防御実数値</div><input type="number" id="def_stat" value="135"></div>
    </div>
</div>

<button id="calcBtn">ダメージ計算実行</button>
<div id="result">計算ボタンを押してください</div>

<script type="module">
    const TYPE_MAP = {
        "ノーマル": "Normal", "ほのお": "Fire", "みず": "Water", "くさ": "Grass", "でんき": "Electric", "こおり": "Ice",
        "かくとう": "Fighting", "どく": "Poison", "じめん": "Ground", "ひこう": "Flying", "エスパー": "Psychic",
        "むし": "Bug", "いわ": "Rock", "ゴースト": "Ghost", "ドラゴン": "Dragon", "あく": "Dark", "はがね": "Steel", "フェアリー": "Fairy"
    };

    const typeIds = ['atk_type', 'move_type', 'def_type1', 'def_type2'];
    typeIds.forEach(id => {
        const select = document.getElementById(id);
        Object.keys(TYPE_MAP).forEach(jp => {
            const opt = document.createElement('option');
            opt.value = TYPE_MAP[jp];
            opt.textContent = jp;
            if (jp === "かくとう") opt.selected = true;
            select.appendChild(opt);
        });
    });

    let calc, P, M, F;
    async function init() {
        const mod = await import('https://cdn.skypack.dev/@smogon/calc');
        calc = mod.calculate; P = mod.Pokemon; M = mod.Move; F = mod.Field;
    }
    window.onload = init;

    document.getElementById('calcBtn').onclick = () => {
        if (!calc) return;
        
        const v = (id) => document.getElementById(id).value;
        const n = (id) => parseInt(document.getElementById(id).value) || 0;
        const isPhys = v('move_cat') === 'Physical';
        const statKey = isPhys ? 'atk' : 'spa';
        const defKey = isPhys ? 'def' : 'spd';

        try {
            // ライブラリの自動再計算をバイパスするため、全ての値をコンストラクタで渡す
            const move = new M(9, 'Close Combat', { // 威力などを上書きするため適当な既存技を指定
                bp: n('move_bp'),
                type: v('move_type'),
                category: v('move_cat')
            });

            const attacker = new P(9, 'Arceus', {
                level: 50,
                types: [v('atk_type')],
                boosts: { [statKey]: n('atk_boost') },
                // rawStats を使うことで、種族値計算をスキップして実数値を直接注入する
                rawStats: { [statKey]: n('atk_stat') }
            });

            const dTypes = [v('def_type1')];
            if (v('def_type2')) dTypes.push(v('def_type2'));
            
            const defender = new P(9, 'Arceus', {
                level: 50,
                types: dTypes,
                rawStats: { hp: n('def_hp'), [defKey]: n('def_stat') }
            });

            // VGC準拠のためダブルバトル設定
            const field = new F({ gameType: 'Doubles' });

            const result = calc(9, attacker, defender, move, field);
            
            // ダメージ配列の抽出（undefined回避）
            const d = result.damage;
            const min = Array.isArray(d) ? d[0] : d;
            const max = Array.isArray(d) ? d[d.length - 1] : d;

            if (min === undefined) throw new Error("Result is undefined");

            const hp = n('def_hp') || 1;
            const minP = ((min / hp) * 100).toFixed(1);
            const maxP = ((max / hp) * 100).toFixed(1);

            document.getElementById('result').innerHTML = 
                `<div style="font-size:26px; font-weight:bold; color:#fff;">${min} 〜 ${max}</div>` +
                `<div style="font-size:18px; color:var(--orange); font-weight:bold; margin:5px 0;">${minP}% 〜 ${maxP}%</div>` +
                `<div class="desc">${result.desc()}</div>`;

        } catch (e) {
            document.getElementById('result').innerHTML = "エラー: " + e.message;
        }
    };
</script>
</body>
</html>
