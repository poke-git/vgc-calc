<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Damage Calc - Fixed</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #3b82f6; --green: #10b981; --orange: #f59e0b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; padding-bottom: 30px; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        #result { margin-top: 15px; padding: 15px; background: #262626; border-radius: 10px; border-left: 5px solid var(--orange); }
        .desc { font-size: 11px; color: #aaa; margin-top: 8px; line-height: 1.4; }
        .status { font-size: 12px; text-align: center; margin-bottom: 10px; color: #888; }
    </style>
</head>
<body>

<div id="status" class="status">⏳ ライブラリ接続中...</div>

<div class="card">
    <h2>攻撃側 (Attacker)</h2>
    <div class="grid">
        <div>
            <div class="label">本体タイプ</div>
            <select id="atk_type"><option value="Normal">ノーマル</option><option value="Fire">ほのお</option><option value="Water">みず</option><option value="Grass">くさ</option><option value="Electric">でんき</option><option value="Ice">こおり</option><option value="Fighting">かくとう</option><option value="Poison">どく</option><option value="Ground">じめん</option><option value="Flying">ひこう</option><option value="Psychic">エスパー</option><option value="Bug">むし</option><option value="Rock">いわ</option><option value="Ghost">ゴースト</option><option value="Dragon">ドラゴン</option><option value="Dark">あく</option><option value="Steel">はがね</option><option value="Fairy">フェアリー</option></select>
        </div>
        <div>
            <div class="label">テラスタイプ</div>
            <select id="atk_tera"><option value="">なし</option><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select>
        </div>
        <div><div class="label">攻撃/特攻 実数値</div><input type="number" id="atk_stat" value="100" inputmode="numeric"></div>
        <div>
            <div class="label">ランク補正</div>
            <select id="atk_boost"><option value="6">+6</option><option value="5">+5</option><option value="4">+4</option><option value="3">+3</option><option value="2">+2</option><option value="1">+1</option><option value="0" selected>±0</option><option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="-4">-4</option><option value="-5">-5</option><option value="-6">-6</option></select>
        </div>
        <div style="grid-column: span 2;">
            <div class="label">持ち物</div>
            <select id="atk_item"><option value="">なし</option><option value="Choice Band">こだわりハチマキ</option><option value="Choice Specs">こだわりメガネ</option><option value="Life Orb">いのちのたま</option><option value="Expert Belt">たつじんのおび</option><option value="Mystic Water">タイプ強化(1.2倍)</option></select>
        </div>
    </div>
</div>

<div class="card">
    <h2>わざ・環境 (Move & Field)</h2>
    <div class="grid">
        <div>
            <div class="label">わざタイプ</div>
            <select id="move_type"><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select>
        </div>
        <div>
            <div class="label">分類</div>
            <select id="move_cat"><option value="Physical">物理</option><option value="Special">特殊</option></select>
        </div>
        <div><div class="label">威力</div><input type="number" id="move_bp" value="80" inputmode="numeric"></div>
        <div>
            <div class="label">天候</div>
            <select id="weather"><option value="">なし</option><option value="Sun">晴れ</option><option value="Rain">雨</option><option value="Sand">砂嵐</option><option value="Snow">雪</option></select>
        </div>
    </div>
</div>

<div class="card">
    <h2>防御側 (Defender)</h2>
    <div class="grid">
        <div><div class="label">HP実数値</div><input type="number" id="def_hp" value="175" inputmode="numeric"></div>
        <div><div class="label">防御/特防 実数値</div><input type="number" id="def_stat" value="100" inputmode="numeric"></div>
        <div>
            <div class="label">タイプ1</div>
            <select id="def_type1"><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select>
        </div>
        <div>
            <div class="label">タイプ2</div>
            <select id="def_type2"><option value="">なし</option><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select>
        </div>
    </div>
</div>

<button id="calcBtn">ダメージ計算実行</button>

<div id="result">数値を入力して計算</div>

<script type="module">
    let calc, P, M, F;
    async function init() {
        try {
            const mod = await import('https://cdn.skypack.dev/@smogon/calc');
            calc = mod.calculate; P = mod.Pokemon; M = mod.Move; F = mod.Field;
            document.getElementById('status').innerText = "✅ 準備完了";
        } catch (e) { document.getElementById('status').innerText = "❌ 読込エラー"; }
    }
    window.onload = init;

    document.getElementById('calcBtn').onclick = () => {
        if (!calc) return;
        try {
            const v = (id) => document.getElementById(id).value;
            const n = (id) => parseInt(v(id));
            const isPhys = v('move_cat') === 'Physical';

            // 1. フィールド設定
            const field = new F({ weather: v('weather'), gameType: 'Doubles' });

            // 2. わざ設定 (タイプを強制指定するため、あえて空の名前を使用)
            const move = new M(9, 'CustomMove', { 
                bp: n('move_bp'), 
                type: v('move_type'), 
                category: v('move_cat') 
            });

            // 3. 攻撃側設定
            const attacker = new P(9, 'Abra', {
                types: [v('atk_type')],
                teraType: v('atk_tera') || undefined,
                item: v('atk_item'),
                boosts: { [isPhys ? 'atk' : 'spa']: n('atk_boost') }
            });
            attacker.rawStats[isPhys ? 'atk' : 'spa'] = n('atk_stat');

            // 4. 防御側設定
            const defender = new P(9, 'Abra', {
                types: [v('def_type1'), v('def_type2')].filter(t => t !== "")
            });
            defender.rawStats.hp = n('def_hp');
            defender.rawStats[isPhys ? 'def' : 'spd'] = n('def_stat');

            // 5. 計算
            const result = calc(9, attacker, defender, move, field);
            const damages = result.damage;
            const min = damages[0];
            const max = damages[damages.length - 1];
            const hp = n('def_hp');

            // 6. 表示
            document.getElementById('result').innerHTML = 
                `<div style="font-size:24px; font-weight:bold;">${min} 〜 ${max}</div>` +
                `<div style="font-size:18px; color:var(--orange); font-weight:bold;">${((min/hp)*100).toFixed(1)}% 〜 ${((max/hp)*100).toFixed(1)}%</div>` +
                `<div class="desc">${result.desc()}</div>`;

        } catch (e) { console.error(e); }
    };
</script>

</body>
</html>
