<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Calc v4</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #3b82f6; --orange: #f59e0b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button:active { background: #2563eb; transform: scale(0.98); }
        #result { margin-top: 15px; padding: 15px; background: #000; border-radius: 10px; border: 2px solid var(--orange); min-height: 80px; }
        .desc { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.4; word-break: break-all; }
        .status { font-size: 12px; text-align: center; margin-bottom: 10px; color: #10b981; }
    </style>
</head>
<body>

<div id="status" class="status">● ライブラリ読み込み中...</div>

<div class="card">
    <h2>攻撃側</h2>
    <div class="grid">
        <div><div class="label">タイプ</div><select id="atk_type"><option value="Normal">ノーマル</option><option value="Fire">ほのお</option><option value="Water">みず</option><option value="Grass">くさ</option><option value="Electric">でんき</option><option value="Ice">こおり</option><option value="Fighting">かくとう</option><option value="Poison">どく</option><option value="Ground">じめん</option><option value="Flying">ひこう</option><option value="Psychic">エスパー</option><option value="Bug">むし</option><option value="Rock">いわ</option><option value="Ghost">ゴースト</option><option value="Dragon">ドラゴン</option><option value="Dark">あく</option><option value="Steel">はがね</option><option value="Fairy">フェアリー</option></select></div>
        <div><div class="label">テラス</div><select id="atk_tera"><option value="">なし</option><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select></div>
        <div><div class="label">攻撃/特攻 実数値</div><input type="number" id="atk_stat" value="100"></div>
        <div><div class="label">ランク</div><select id="atk_boost"><option value="6">+6</option><option value="5">+5</option><option value="4">+4</option><option value="3">+3</option><option value="2">+2</option><option value="1">+1</option><option value="0" selected>±0</option><option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="-4">-4</option><option value="-5">-5</option><option value="-6">-6</option></select></div>
        <div style="grid-column: span 2;"><div class="label">持ち物</div><select id="atk_item"><option value="">なし</option><option value="Choice Band">ハチマキ</option><option value="Choice Specs">メガネ</option><option value="Life Orb">珠</option><option value="Expert Belt">帯</option><option value="Mystic Water">タイプ強化</option></select></div>
    </div>
</div>

<div class="card">
    <h2>わざ・環境</h2>
    <div class="grid">
        <div><div class="label">わざタイプ</div><select id="move_type"><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select></div>
        <div><div class="label">分類</div><select id="move_cat"><option value="Physical">物理</option><option value="Special">特殊</option></select></div>
        <div><div class="label">威力</div><input type="number" id="move_bp" value="80"></div>
        <div><div class="label">天候</div><select id="weather"><option value="">なし</option><option value="Sun">晴れ</option><option value="Rain">雨</option><option value="Sand">砂嵐</option><option value="Snow">雪</option></select></div>
    </div>
</div>

<div class="card">
    <h2>防御側</h2>
    <div class="grid">
        <div><div class="label">HP実数値</div><input type="number" id="def_hp" value="175"></div>
        <div><div class="label">防御/特防 実数値</div><input type="number" id="def_stat" value="100"></div>
        <div><div class="label">タイプ1</div><select id="def_type1"><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select></div>
        <div><div class="label">タイプ2</div><select id="def_type2"><option value="">なし</option><script>document.write(document.querySelector('#atk_type').innerHTML);</script></select></div>
    </div>
</div>

<button id="calcBtn">ダメージ計算実行</button>
<div id="result">数値を入力してください</div>

<script type="module">
    let calc, P, M, F;
    async function init() {
        try {
            const mod = await import('https://cdn.skypack.dev/@smogon/calc');
            calc = mod.calculate; P = mod.Pokemon; M = mod.Move; F = mod.Field;
            document.getElementById('status').innerText = "● 計算可能 (Ready)";
        } catch (e) { document.getElementById('status').innerText = "● 読込失敗"; }
    }
    window.onload = init;

    document.getElementById('calcBtn').onclick = () => {
        if (!calc) return;
        const v = (id) => document.getElementById(id).value;
        const n = (id) => parseInt(document.getElementById(id).value) || 1;

        try {
            const isPhys = v('move_cat') === 'Physical';
            const field = new F({ weather: v('weather'), gameType: 'Doubles' });
            const move = new M(9, 'Tackle', { bp: n('move_bp'), type: v('move_type'), category: v('move_cat') });

            // 【重要】実数値から逆算してステータスを設定する関数
            // 努力値(ev) = (実数値 / 補正 - 5) * 8 - 31 * 2 (Lv50の場合の簡易計算)
            const calcEv = (stat) => Math.max(0, Math.min(252, (stat - 5) * 8 - 62));

            const attacker = new P(9, 'Abra', {
                level: 50,
                types: [v('atk_type')],
                teraType: v('atk_tera') || undefined,
                item: v('atk_item'),
                boosts: { [isPhys ? 'atk' : 'spa']: n('atk_boost') },
                evs: { [isPhys ? 'atk' : 'spa']: calcEv(n('atk_stat')) },
                ivs: { [isPhys ? 'atk' : 'spa']: 31 },
                nature: 'Hardy'
            });
            // ライブラリの最終数値を強制セット
            attacker.stats[isPhys ? 'atk' : 'spa'] = n('atk_stat');

            const defender = new P(9, 'Abra', {
                level: 50,
                types: [v('def_type1'), v('def_type2')].filter(t => t !== ""),
                evs: { 
                    hp: Math.max(0, Math.min(252, (n('def_hp') - 110) * 8)), 
                    [isPhys ? 'def' : 'spd']: calcEv(n('def_stat')) 
                },
                ivs: { hp: 31, [isPhys ? 'def' : 'spd']: 31 },
                nature: 'Hardy'
            });
            defender.stats.hp = n('def_hp');
            defender.stats[isPhys ? 'def' : 'spd'] = n('def_stat');

            const result = calc(9, attacker, defender, move, field);
            const d = result.damage;
            const min = Array.isArray(d) ? d[0] : d;
            const max = Array.isArray(d) ? d[d.length - 1] : d;
            const hp = n('def_hp');

            document.getElementById('result').innerHTML = 
                `<div style="font-size:24px; font-weight:bold;">${min} 〜 ${max}</div>` +
                `<div style="font-size:18px; color:var(--orange); font-weight:bold;">${((min/hp)*100).toFixed(1)}% 〜 ${((max/hp)*100).toFixed(1)}%</div>` +
                `<div class="desc">${result.desc()}</div>` +
                `<div style="font-size:9px; color:#555; margin-top:5px;">Update: ${new Date().toLocaleTimeString()}</div>`;

        } catch (e) { document.getElementById('result').innerText = "エラー: " + e.message; }
    };
</script>
</body>
</html>
