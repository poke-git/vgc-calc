<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Calc v0.013</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #3b82f6; --orange: #f59e0b; --mega: #a855f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; padding-bottom: 50px; }
        .version { position: fixed; top: 5px; right: 10px; font-size: 10px; color: #666; font-weight: bold; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .mega-select { border: 1px solid var(--mega) !important; color: var(--mega) !important; font-weight: bold; margin-bottom: 10px; }
        .check-group { display: flex; align-items: center; gap: 10px; margin-top: 5px; font-size: 13px; }
        button { width: 100%; padding: 18px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        #result { margin-top: 15px; padding: 15px; background: #000; border-radius: 10px; border: 2px solid var(--orange); }
        .calc-log { font-size: 10px; color: #555; margin-top: 10px; font-family: monospace; line-height: 1.4; }
    </style>
</head>
<body>

<div class="version">v0.013</div>

<div class="card">
    <h2>攻撃側 (Mega Evolution Ready)</h2>
    <select id="atk_pokemon" class="mega-select"><option value="">カスタム(手入力)</option></select>
    <div class="grid">
        <div><div class="label">本体タイプ</div><select id="atk_type"></select></div>
        <div><div class="label">攻撃実数値(準特化)</div><input type="number" id="atk_stat" value="202"></div>
        <div><div class="label">ランク補正</div>
            <select id="atk_boost">
                <option value="0" selected>±0</option><option value="6">+6</option><option value="-6">-6</option>
            </select>
        </div>
        <div><div class="label">持ち物</div>
            <select id="atk_item">
                <option value="1.0">なし</option><option value="1.5">ハチマキ/メガネ</option><option value="1.3">たま</option>
            </select>
        </div>
    </div>
</div>

<div class="card">
    <h2>わざ・環境</h2>
    <div class="grid">
        <div><div class="label">わざタイプ</div><select id="move_type"></select></div>
        <div><div class="label">威力</div><input type="number" id="move_bp" value="100"></div>
        <div><div class="label">天候</div>
            <select id="weather">
                <option value="none">なし</option><option value="sun">晴れ</option><option value="rain">雨</option>
            </select>
        </div>
        <div><div class="label">分類</div><select id="move_cat"><option value="Physical">物理</option><option value="Special">特殊</option></select></div>
    </div>
    <div class="check-group">
        <input type="checkbox" id="is_double"> <label for="is_double">ダブルダメージ (0.75x)</label>
    </div>
</div>

<div class="card">
    <h2>防御側 (Mega Evolution Ready)</h2>
    <select id="def_pokemon" class="mega-select"><option value="">カスタム(手入力)</option></select>
    <div class="grid">
        <div><div class="label">タイプ1</div><select id="def_type1"></select></div>
        <div><div class="label">タイプ2</div><select id="def_type2"><option value="">なし</option></select></div>
        <div><div class="label">HP実数値(無振り)</div><input type="number" id="def_hp" value="175"></div>
        <div><div class="label">防御実数値(無振り)</div><input type="number" id="def_stat" value="135"></div>
    </div>
</div>

<button id="calcBtn">ダメージ計算実行</button>
<div id="result">ポケモンを選んで計算！</div>

<script>
// メガ進化データ (種族値: HP, Atk, Def, SpA, SpD, Type1, Type2)
const MEGA_DATA = {
    "メガレックウザ": [105, 180, 100, 180, 100, "ドラゴン", "ひこう"],
    "メガミュウツーX": [106, 190, 100, 154, 100, "エスパー", "かくとう"],
    "メガミュウツーY": [106, 150, 70, 194, 120, "エスパー", ""],
    "メガゲンガー": [60, 65, 80, 170, 95, "ゴースト", "どく"],
    "メガガルーラ": [105, 125, 100, 60, 100, "ノーマル", ""],
    "メガボーマンダ": [95, 145, 130, 120, 90, "ドラゴン", "ひこう"],
    "メガメタグロス": [80, 145, 150, 105, 110, "はがね", "エスパー"],
    "ボルトロス(メガ相当)": [79, 115, 70, 145, 80, "でんき", "ひこう"], // Legends ZA想定枠
    "メガバシャーモ": [80, 160, 80, 130, 80, "ほのお", "かくとう"],
    "メガルカリオ": [70, 145, 88, 140, 70, "かくとう", "はがね"],
    "メガサーナイト": [68, 85, 65, 165, 135, "エスパー", "フェアリー"]
};

const TYPES = ["ノーマル", "ほのお", "みず", "くさ", "でんき", "こおり", "かくとう", "どく", "じめん", "ひこう", "エスパー", "むし", "いわ", "ゴースト", "ドラゴン", "あく", "はがね", "フェアリー"];
const CHART = { "かくとう": {"ノーマル": 2, "こおり": 2, "いわ": 2, "あく": 2, "はがね": 2, "どく": 0.5, "ひこう": 0.5, "エスパー": 0.5, "むし": 0.5, "フェアリー": 0.5, "ゴースト": 0}, "ほのお": {"くさ": 2, "こおり": 2, "むし": 2, "はがね": 2, "ほのお": 0.5, "みず": 0.5, "いわ": 0.5, "ドラゴン": 0.5}, "みず": {"ほのお": 2, "じめん": 2, "いわ": 2, "みず": 0.5, "くさ": 0.5, "ドラゴン": 0.5} /* 他略 */ };

// 初期設定
const setup = () => {
    ['atk_type', 'move_type', 'def_type1', 'def_type2'].forEach(id => {
        const s = document.getElementById(id);
        TYPES.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            if(t === "かくとう") opt.selected = true;
            s.appendChild(opt);
        });
    });
    ['atk_pokemon', 'def_pokemon'].forEach(id => {
        const s = document.getElementById(id);
        Object.keys(MEGA_DATA).forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.textContent = name;
            s.appendChild(opt);
        });
    });
};
setup();

// ポケモン選択時の自動入力
const updatePoke = (side) => {
    const name = document.getElementById(side + '_pokemon').value;
    if(!name) return;
    const data = MEGA_DATA[name];
    const isAtk = side === 'atk';
    const isPhys = document.getElementById('move_cat').value === 'Physical';
    
    if(isAtk) {
        document.getElementById('atk_type').value = data[5];
        // 攻撃実数値 (252振り, 性格補正1.1)
        const base = isPhys ? data[1] : data[3];
        document.getElementById('atk_stat').value = Math.floor((Math.floor((base * 2 + 31 + 252/4) * 50 / 100) + 5) * 1.1);
    } else {
        document.getElementById('def_type1').value = data[5];
        document.getElementById('def_type2').value = data[6] || "";
        // HP実数値 (0振り)
        document.getElementById('def_hp').value = Math.floor((data[0] * 2 + 31) * 50 / 100) + 50 + 10;
        // 防御実数値 (0振り)
        const base = isPhys ? data[2] : data[4];
        document.getElementById('def_stat').value = Math.floor((base * 2 + 31) * 50 / 100) + 5;
    }
};

document.getElementById('atk_pokemon').onchange = () => updatePoke('atk');
document.getElementById('def_pokemon').onchange = () => updatePoke('def');
document.getElementById('move_cat').onchange = () => { updatePoke('atk'); updatePoke('def'); };

// ダメージ計算ロジック (v0.012継承)
document.getElementById('calcBtn').onclick = () => {
    const n = (id) => parseFloat(document.getElementById(id).value) || 0;
    const v = (id) => document.getElementById(id).value;
    const isChecked = (id) => document.getElementById(id).checked;

    const atk = n('atk_stat') * (n('atk_boost') >= 0 ? (2 + n('atk_boost')) / 2 : 2 / (2 + Math.abs(n('atk_boost')))) * n('atk_item');
    const def = n('def_stat');
    const bp = n('move_bp');

    let damage = Math.floor(Math.floor(Math.floor(Math.floor(2 * 50 / 5 + 2) * bp * atk / def) / 50) + 2);
    if (isChecked('is_double')) damage = Math.floor(damage * 0.75);
    
    if ((v('weather') === 'sun' && v('move_type') === 'ほのお') || (v('weather') === 'rain' && v('move_type') === 'みず')) damage = Math.floor(damage * 1.5);
    
    const stab = (v('atk_type') === v('move_type')) ? 1.5 : 1;
    const getEff = (mt, dt) => (CHART[mt] && CHART[mt][dt] !== undefined) ? CHART[mt][dt] : 1;
    let effect = getEff(v('move_type'), v('def_type1'));
    if(v('def_type2')) effect *= getEff(v('move_type'), v('def_type2'));

    const results = [];
    for (let i = 85; i <= 100; i++) {
        let d = Math.floor(Math.floor(Math.floor(damage * i / 100) * stab) * effect);
        if (n('atk_item') === 1.3) d = Math.floor(d * 1.3);
        results.push(d);
    }

    const min = results[0], max = results[15], hp = n('def_hp') || 1;
    document.getElementById('result').innerHTML = `
        <div style="font-size:28px; font-weight:bold; color:#fff;">${min} 〜 ${max}</div>
        <div style="font-size:18px; color:var(--orange); font-weight:bold;">${((min/hp)*100).toFixed(1)}% 〜 ${((max/hp)*100).toFixed(1)}%</div>
        <div class="calc-log">Atk: ${atk.toFixed(1)} / Def: ${def} / HP: ${hp}</div>
    `;
};
</script>
</body>
</html>
