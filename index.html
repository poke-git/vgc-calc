<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Calc v0.011</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #3b82f6; --orange: #f59e0b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .version { position: fixed; top: 5px; right: 10px; font-size: 10px; color: #666; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        #result { margin-top: 15px; padding: 15px; background: #000; border-radius: 10px; border: 2px solid var(--orange); }
        .calc-log { font-size: 10px; color: #555; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="version">v0.011</div>

<div class="card">
    <h2>攻撃側</h2>
    <div class="grid">
        <div><div class="label">本体タイプ</div><select id="atk_type"></select></div>
        <div><div class="label">攻撃実数値</div><input type="number" id="atk_stat" value="202"></div>
        <div style="grid-column: span 2;">
            <div class="label">ランク補正</div>
            <select id="atk_boost">
                <option value="6">+6</option><option value="5">+5</option><option value="4">+4</option><option value="3">+3</option><option value="2">+2</option><option value="1">+1</option>
                <option value="0" selected>±0</option>
                <option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="-4">-4</option><option value="-5">-5</option><option value="-6">-6</option>
            </select>
        </div>
    </div>
</div>

<div class="card">
    <h2>わざ</h2>
    <div class="grid">
        <div><div class="label">わざタイプ</div><select id="move_type"></select></div>
        <div><div class="label">分類</div><select id="move_cat"><option value="Physical">物理</option><option value="Special">特殊</option></select></div>
        <div style="grid-column: span 2;"><div class="label">威力</div><input type="number" id="move_bp" value="100"></div>
    </div>
</div>

<div class="card">
    <h2>防御側</h2>
    <div class="grid">
        <div><div class="label">タイプ1</div><select id="def_type1"></select></div>
        <div><div class="label">タイプ2</div><select id="def_type2"><option value="">なし</option></select></div>
        <div><div class="label">HP実数値</div><input type="number" id="def_hp" value="175"></div>
        <div><div class="label">防御実数値</div><input type="number" id="def_stat" value="135"></div>
    </div>
</div>

<button id="calcBtn">計算実行</button>
<div id="result">結果がここに表示されます</div>

<script>
// タイプ相性表 (0:無効, 0.5:半減, 1:等倍, 2:抜群)
const TYPES = ["ノーマル", "ほのお", "みず", "くさ", "でんき", "こおり", "かくとう", "どく", "じめん", "ひこう", "エスパー", "むし", "いわ", "ゴースト", "ドラゴン", "あく", "はがね", "フェアリー"];
const CHART = {
    "かくとう": {"ノーマル": 2, "こおり": 2, "いわ": 2, "あく": 2, "はがね": 2, "どく": 0.5, "ひこう": 0.5, "エスパー": 0.5, "むし": 0.5, "フェアリー": 0.5, "ゴースト": 0},
    "ほのお": {"くさ": 2, "こおり": 2, "むし": 2, "はがね": 2, "ほのお": 0.5, "みず": 0.5, "いわ": 0.5, "ドラゴン": 0.5},
    "みず": {"ほのお": 2, "じめん": 2, "いわ": 2, "みず": 0.5, "くさ": 0.5, "ドラゴン": 0.5},
    // 他の相性は必要に応じて追加（今回はデバッグ対象の"かくとう"を優先実装）
};

// UI構築
const setupSelects = () => {
    const ids = ['atk_type', 'move_type', 'def_type1', 'def_type2'];
    ids.forEach(id => {
        const s = document.getElementById(id);
        TYPES.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            if(t === "かくとう") opt.selected = true;
            s.appendChild(opt);
        });
    });
};
setupSelects();

const getRankMod = (rank) => {
    const r = parseInt(rank);
    return r >= 0 ? (2 + r) / 2 : 2 / (2 - r);
};

document.getElementById('calcBtn').onclick = () => {
    const n = (id) => parseFloat(document.getElementById(id).value) || 0;
    const v = (id) => document.getElementById(id).value;

    // --- ポケモン ダメージ計算ロジック ---
    const level = 50;
    const atkBase = n('atk_stat') * getRankMod(v('atk_boost'));
    const defBase = n('def_stat');
    const bp = n('move_bp');

    // 1. 基本ダメージ計算: floor(floor(floor(2 * Level / 5 + 2) * Power * A / D) / 50) + 2
    let baseDamage = Math.floor(Math.floor(Math.floor(Math.floor(2 * level / 5 + 2) * bp * atkBase / defBase) / 50) + 2);

    // 2. タイプ相性の計算
    const getEffect = (mType, dType) => (CHART[mType] && CHART[mType][dType] !== undefined) ? CHART[mType][dType] : 1;
    let effect = getEffect(v('move_type'), v('def_type1'));
    if(v('def_type2')) effect *= getEffect(v('move_type'), v('def_type2'));

    // 3. タイプ一致補正 (STAB)
    const stab = (v('atk_type') === v('move_type')) ? 1.5 : 1;

    // 4. 乱数幅の計算 (0.85 〜 1.00)
    const results = [];
    for (let i = 85; i <= 100; i++) {
        // 公式の順序: floor(floor(Base * Random / 100) * STAB) * TypeEffect
        let d = Math.floor(baseDamage * i / 100);
        d = Math.floor(d * stab);
        d = Math.floor(d * effect);
        results.push(d);
    }

    const min = results[0];
    const max = results[results.length - 1];
    const hp = n('def_hp') || 1;

    document.getElementById('result').innerHTML = `
        <div style="font-size:28px; font-weight:bold; color:#fff;">${min} 〜 ${max}</div>
        <div style="font-size:18px; color:var(--orange); font-weight:bold; margin:5px 0;">
            ${((min/hp)*100).toFixed(1)}% 〜 ${((max/hp)*100).toFixed(1)}%
        </div>
        <div class="calc-log">
            Base: ${baseDamage} | STAB: ${stab}x | Type: ${effect}x<br>
            A: ${atkBase.toFixed(1)} / D: ${defBase}<br>
            Rolls: ${results.join(', ')}
        </div>
    `;
};
</script>
</body>
</html>
