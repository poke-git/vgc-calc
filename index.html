<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Calc v0.016</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #3b82f6; --orange: #f59e0b; --mega: #a855f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; padding-bottom: 50px; }
        .version { position: fixed; top: 5px; right: 10px; font-size: 10px; color: #666; font-weight: bold; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
        /* 種族値表示を大きく変更 */
        .base-stats { font-size: 16px; color: var(--mega); margin-bottom: 8px; font-family: 'Courier New', monospace; font-weight: bold; min-height: 20px; letter-spacing: 1px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .mega-select { border: 2px solid var(--mega) !important; color: var(--mega) !important; font-weight: bold; margin-bottom: 10px; height: 45px; }
        .check-group { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 12px; background: #252525; border-radius: 8px; cursor: pointer; border: 1px solid #444; }
        .check-group label { cursor: pointer; font-size: 14px; flex-grow: 1; font-weight: bold; }
        input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; }
        button { width: 100%; padding: 18px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 0 #1d4ed8; }
        button:active { transform: translateY(2px); box-shadow: none; }
        #result { margin-top: 15px; padding: 15px; background: #000; border-radius: 10px; border: 2px solid var(--orange); text-align: center; }
        .calc-log { font-size: 11px; color: #777; margin-top: 10px; font-family: monospace; line-height: 1.4; text-align: left; }
    </style>
</head>
<body>

<div class="version">v0.016</div>

<div class="card">
    <h2>攻撃側</h2>
    <div id="atk_base_display" class="base-stats">H-A-B-C-D-S</div>
    <select id="atk_pokemon" class="mega-select"><option value="">カスタム(手入力)</option></select>
    <div class="grid">
        <div><div class="label">本体タイプ1</div><select id="atk_type1"></select></div>
        <div><div class="label">本体タイプ2</div><select id="atk_type2"><option value="">なし</option></select></div>
        <div><div class="label">攻撃/特攻 実数値</div><input type="number" id="atk_stat" value="202"></div>
        <div><div class="label">ランク補正</div>
            <select id="atk_boost">
                <option value="0" selected>±0</option><option value="1">+1</option><option value="2">+2</option>
                <option value="-1">-1</option><option value="-2">-2</option>
            </select>
        </div>
        <div style="grid-column: span 2;">
            <div class="label">特性補正</div>
            <select id="atk_ability">
                <option value="1.0">なし</option>
                <option value="2.0">ちからもち系 (2.0倍)</option>
                <option value="1.5">てだすけ/適応力等 (1.5倍)</option>
                <option value="1.3">いのちのたま補正 (1.3倍)</option>
            </select>
        </div>
    </div>
</div>

<div class="card">
    <h2>わざ・環境</h2>
    <div class="grid">
        <div><div class="label">わざタイプ</div><select id="move_type"></select></div>
        <div><div class="label">威力</div><input type="number" id="move_bp" value="100"></div>
        <div><div class="label">天候</div>
            <select id="weather">
                <option value="none">なし</option><option value="sun">晴れ</option><option value="rain">雨</option>
                <option value="sand">砂嵐</option><option value="snow">雪</option>
            </select>
        </div>
        <div><div class="label">分類</div><select id="move_cat"><option value="Physical">物理</option><option value="Special">特殊</option></select></div>
    </div>
    <div class="check-group" onclick="document.getElementById('is_double').click()">
        <input type="checkbox" id="is_double">
        <label for="is_double">ダブルダメージ (0.75倍)</label>
    </div>
</div>

<div class="card">
    <h2>防御側</h2>
    <div id="def_base_display" class="base-stats">H-A-B-C-D-S</div>
    <select id="def_pokemon" class="mega-select"><option value="">カスタム(手入力)</option></select>
    <div class="grid">
        <div><div class="label">タイプ1</div><select id="def_type1"></select></div>
        <div><div class="label">タイプ2</div><select id="def_type2"><option value="">なし</option></select></div>
        <div><div class="label">HP実数値</div><input type="number" id="def_hp" value="175"></div>
        <div><div class="label">防御/特防 実数値</div><input type="number" id="def_stat" value="135"></div>
    </div>
</div>

<button id="calcBtn">DAMAGE CALCULATE</button>
<div id="result">ポケモンを選択してください</div>

<script>
const MEGA_DATA = {
    "メガバンギラス": [100, 164, 150, 95, 120, 71, "いわ", "あく"],
    "メガドリュウズ": [110, 185, 90, 50, 85, 108, "じめん", "はがね"],
    "メガレックウザ": [105, 180, 100, 180, 100, 115, "ドラゴン", "ひこう"],
    "メガメタグロス": [80, 145, 150, 105, 110, 110, "はがね", "エスパー"],
    "メガガブリアス": [108, 170, 115, 120, 95, 92, "ドラゴン", "じめん"],
    "メガクチート": [50, 105, 125, 55, 95, 50, "はがね", "フェアリー"],
    "メガボーマンダ": [95, 145, 130, 120, 90, 120, "ドラゴン", "ひこう"],
    "メガバシャーモ": [80, 160, 80, 130, 80, 100, "ほのお", "かくとう"],
    "メガルカリオ": [70, 145, 88, 140, 70, 112, "かくとう", "はがね"],
    "メガゲンガー": [60, 65, 80, 170, 95, 130, "ゴースト", "どく"],
    "メガガルーラ": [105, 125, 100, 60, 100, 100, "ノーマル", ""]
};

const TYPES = ["ノーマル", "ほのお", "みず", "くさ", "でんき", "こおり", "かくとう", "どく", "じめん", "ひこう", "エスパー", "むし", "いわ", "ゴースト", "ドラゴン", "あく", "はがね", "フェアリー"];
const CHART = { "かくとう": {"ノーマル": 2, "こおり": 2, "いわ": 2, "あく": 2, "はがね": 2, "どく": 0.5, "ひこう": 0.5, "エスパー": 0.5, "むし": 0.5, "フェアリー": 0.5, "ゴースト": 0}, "ほのお": {"くさ": 2, "こおり": 2, "むし": 2, "はがね": 2, "ほのお": 0.5, "みず": 0.5, "いわ": 0.5, "ドラゴン": 0.5}, "みず": {"ほのお": 2, "じめん": 2, "いわ": 2, "みず": 0.5, "くさ": 0.5, "ドラゴン": 0.5}, "いわ": {"ほのお": 2, "こおり": 2, "ひこう": 2, "むし": 2, "かくとう": 0.5, "じめん": 0.5, "はがね": 0.5} };

const setup = () => {
    ['atk_type1', 'atk_type2', 'move_type', 'def_type1', 'def_type2'].forEach(id => {
        const s = document.getElementById(id);
        TYPES.forEach(t => {
            const opt = document.createElement('option'); opt.value = t; opt.textContent = t;
            if(t === "かくとう" && id !== 'atk_type2' && id !== 'def_type2') opt.selected = true;
            s.appendChild(opt);
        });
    });
    ['atk_pokemon', 'def_pokemon'].forEach(id => {
        const s = document.getElementById(id);
        Object.keys(MEGA_DATA).forEach(name => {
            const opt = document.createElement('option'); opt.value = name; opt.textContent = name;
            s.appendChild(opt);
        });
    });
};
setup();

const updatePoke = (side) => {
    const name = document.getElementById(side + '_pokemon').value;
    const disp = document.getElementById(side + '_base_display');
    if(!name) { disp.textContent = "H-A-B-C-D-S"; return; }
    
    const d = MEGA_DATA[name];
    disp.textContent = `H${d[0]} A${d[1]} B${d[2]} C${d[3]} D${d[4]} S${d[5]}`;
    
    const isPhys = document.getElementById('move_cat').value === 'Physical';
    if(side === 'atk') {
        document.getElementById('atk_type1').value = d[6];
        document.getElementById('atk_type2').value = d[7] || "";
        document.getElementById('atk_stat').value = Math.floor(((isPhys?d[1]:d[3]) + 52) * 1.1);
        if(name === "メガクチート" && isPhys) document.getElementById('atk_ability').value = "2.0";
    } else {
        document.getElementById('def_type1').value = d[6];
        document.getElementById('def_type2').value = d[7] || "";
        document.getElementById('def_hp').value = d[0] + 75;
        document.getElementById('def_stat').value = (isPhys?d[2]:d[4]) + 20;
    }
};

document.getElementById('atk_pokemon').onchange = () => updatePoke('atk');
document.getElementById('def_pokemon').onchange = () => updatePoke('def');
document.getElementById('move_cat').onchange = () => { updatePoke('atk'); updatePoke('def'); };

document.getElementById('calcBtn').onclick = () => {
    const n = (id) => parseFloat(document.getElementById(id).value) || 0;
    const v = (id) => document.getElementById(id).value;
    const isDouble = document.getElementById('is_double').checked;

    let atkVal = n('atk_stat') * (n('atk_boost') >= 0 ? (2 + n('atk_boost')) / 2 : 2 / (2 + Math.abs(n('atk_boost'))));
    atkVal = Math.floor(atkVal * n('atk_ability'));
    
    let defVal = n('def_stat');
    if(v('weather') === 'sand' && v('move_cat') === 'Special' && (v('def_type1') === 'いわ' || v('def_type2') === 'いわ')) defVal = Math.floor(defVal * 1.5);
    if(v('weather') === 'snow' && v('move_cat') === 'Physical' && (v('def_type1') === 'こおり' || v('def_type2') === 'こおり')) defVal = Math.floor(defVal * 1.5);

    let damage = Math.floor(Math.floor(Math.floor(Math.floor(2 * 50 / 5 + 2) * n('move_bp') * atkVal / defVal) / 50) + 2);
    if (isDouble) damage = Math.floor(damage * 0.75);
    if ((v('weather') === 'sun' && v('move_type') === 'ほのお') || (v('weather') === 'rain' && v('move_type') === 'みず')) damage = Math.floor(damage * 1.5);

    // タイプ一致判定 (Type1 または Type2 と一致)
    const stab = (v('atk_type1') === v('move_type') || v('atk_type2') === v('move_type')) ? 1.5 : 1;
    
    const getEff = (mt, dt) => (CHART[mt] && CHART[mt][dt] !== undefined) ? CHART[mt][dt] : 1;
    let effect = getEff(v('move_type'), v('def_type1'));
    if(v('def_type2')) effect *= getEff(v('move_type'), v('def_type2'));

    const res = [];
    for (let i = 85; i <= 100; i++) {
        res.push(Math.floor(Math.floor(Math.floor(damage * i / 100) * stab) * effect));
    }

    const min = res[0], max = res[15], hp = n('def_hp') || 1;
    document.getElementById('result').innerHTML = `
        <div style="font-size:32px; font-weight:bold; color:#fff;">${min} 〜 ${max}</div>
        <div style="font-size:20px; color:var(--orange); font-weight:bold; margin-top:5px;">${((min/hp)*100).toFixed(1)}% 〜 ${((max/hp)*100).toFixed(1)}%</div>
        <div class="calc-log">
            Final Atk: ${atkVal} / Def: ${defVal} / HP: ${hp}<br>
            STAB: ${stab}x | Effect: ${effect}x | Multi: ${isDouble?'0.75x':'1.0x'}
        </div>
    `;
};
</script>
</body>
</html>
