<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Calc Pro</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #4dabf7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        #log { font-family: monospace; font-size: 10px; color: #888; margin-top: 20px; white-space: pre-wrap; background: #000; padding: 10px; border-radius: 5px; }
        #result { margin-top: 20px; padding: 15px; background: #2b2b2b; border-radius: 8px; border-left: 5px solid var(--blue); font-size: 1.2rem; }
        .label { font-size: 12px; margin-bottom: 5px; color: #aaa; }
    </style>
</head>
<body>

<div id="status">⏳ ライブラリ接続中...</div>

<div class="card">
    <div class="label">攻撃側 実数値</div>
    <input type="number" id="atk" value="100" inputmode="numeric">
    <div style="margin-top:10px" class="label">わざ威力</div>
    <input type="number" id="bp" value="80" inputmode="numeric">
</div>

<div class="card">
    <div class="label">防御側 HP実数値</div>
    <input type="number" id="hp" value="175" inputmode="numeric">
    <div style="margin-top:10px" class="label">防御側 防御/特防実数値</div>
    <input type="number" id="def" value="100" inputmode="numeric">
</div>

<button id="calcBtn">計算実行</button>

<div id="result">数値を入力してボタンを押してください</div>

<div id="log">System Log: Initializing...</div>

<script type="module">
    // iPhoneのSafariで最も安定する「ES Modules」形式での読み込み
    const log = (msg) => { document.getElementById('log').innerText += "\n" + msg; };
    
    let calcMethod;
    let P;
    let M;

    async function init() {
        try {
            log("Loading library from Skypack...");
            // Skypack CDNを使用（スマホブラウザと相性が良い）
            const module = await import('https://cdn.skypack.dev/@smogon/calc');
            calcMethod = module.calculate;
            P = module.Pokemon;
            M = module.Move;
            
            document.getElementById('status').innerText = "✅ 準備完了";
            document.getElementById('status').style.color = "#4caf50";
            log("Library loaded successfully.");
        } catch (e) {
            document.getElementById('status').innerText = "❌ 読み込み失敗";
            log("ERROR: " + e.message);
        }
    }

    window.onload = init;

    document.getElementById('calcBtn').onclick = () => {
        if (!calcMethod) {
            alert("ライブラリがまだ読み込まれていません。");
            return;
        }

        try {
            const atk = parseInt(document.getElementById('atk').value);
            const bp = parseInt(document.getElementById('bp').value);
            const hp = parseInt(document.getElementById('hp').value);
            const def = parseInt(document.getElementById('def').value);

            // シンプルな計算モデルの構築
            const result = calcMethod(
                9,
                new P(9, 'Pikachu', {evs: {atk: 0}}),
                new P(9, 'Pikachu', {evs: {hp: 0}}),
                new M(9, 'Tackle', {bp: bp})
            );

            // 実数値を強制上書き
            result.attacker.rawStats.atk = atk;
            result.defender.rawStats.hp = hp;
            result.defender.rawStats.def = def;

            const damages = result.damage;
            const min = damages[0];
            const max = damages[damages.length - 1];
            
            const minP = ((min / hp) * 100).toFixed(1);
            const maxP = ((max / hp) * 100).toFixed(1);

            document.getElementById('result').innerHTML = 
                `<strong>${min} 〜 ${max} ダメージ</strong><br>` +
                `<span style="color:#4dabf7">${minP}% 〜 ${maxP}%</span>`;
            
            log("Calculation success.");
        } catch (e) {
            log("Calc Error: " + e.message);
        }
    };
</script>

</body>
</html>
