<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VGC Calc v0.018</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --blue: #3b82f6; --orange: #f59e0b; --mega: #a855f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; padding-bottom: 50px; }
        .version { position: fixed; top: 5px; right: 10px; font-size: 10px; color: #666; font-weight: bold; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
        
        /* 種族値表示 */
        .base-stats { font-size: 18px; color: var(--mega); margin-bottom: 10px; font-family: 'Courier New', monospace; font-weight: bold; text-align: center; background: #000; padding: 5px; border-radius: 6px; }
        
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* メガ進化チェックボックスの調整 */
        .mega-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #2d1b3d;
            border: 2px solid var(--mega);
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .mega-toggle:active { opacity: 0.7; }
        .mega-toggle input[type="checkbox"] { width: 22px; height: 22px; margin: 0; cursor: pointer; }
        .mega-toggle label { color: #d8b4fe; font-weight: bold; font-size: 16px; cursor: pointer; user-select: none; }

        /* 環境チェックボックス */
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; background: #2a2a2a; padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #444; }
        .check-item input { width: 18px; height: 18px; margin: 0; }

        button { width: 100%; padding: 20px; background: var(--blue); color: white; border: none; border-radius: 14px; font-size: 20px; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 0 #1d4ed8; }
        button:active { transform: translateY(2px); box-shadow: none; }
        #result { margin-top: 15px; padding: 20px; background: #000; border-radius: 12px; border: 2px solid var(--orange); text-align: center; }
    </style>
</head>
<body>

<div class="version">v0.018</div>

<div class="card">
    <h2>攻撃側</h2>
    <div id="atk_base_display" class="base-stats">H-A-B-C-D-S</div>
    <select id="atk_pokemon"><option value="">カスタム(手入力)</option></select>
    
    <label class="mega-toggle">
        <input type="checkbox" id="atk_mega">
        <span>メガ進化</span>
    </label>

    <div class="grid">
        <div><div class="label">タイプ1</div><select id="atk_type1"></select></div>
        <div><div class="label">タイプ2</div><select id="atk_type2"><option value="">なし</option></select></div>
        <div><div class="label">攻撃/特攻 実数値</div><input type="number" id="atk_stat" value="202"></div>
        <div><div class="label">ランク</div>
            <select id="atk_boost">
                <option value="0" selected>±0</option><option value="1">+1</option><option value="2">+2</option><option value="-1">-1</option>
            </select>
        </div>
    </div>
</div>

<div class="card">
    <h2>わざ・環境</h2>
    <div class="grid">
        <div><div class="label">わざタイプ</div><select id="move_type"></select></div>
        <div><div class="label">威力</div><input type="number" id="move_bp" value="100"></div>
    </div>
    
    <div class="weather-grid">
        <label class="check-item"><input type="checkbox" id="is_double"> <span>ダブルダメージ</span></label>
        <label class="check-item"><input type="checkbox" id="weather_sun"> <span>晴れ</span></label>
        <label class="check-item"><input type="checkbox" id="weather_rain"> <span>雨</span></label>
        <label class="check-item"><input type="checkbox" id="weather_sand"> <span>砂嵐</span></label>
        <label class="check-item"><input type="checkbox" id="weather_snow"> <span>雪</span></label>
        <select id="move_cat" style="padding:8px; font-size:13px;"><option value="Physical">物理わざ</option><option value="Special">特殊わざ</option></select>
    </div>
</div>

<div class="card">
    <h2>防御側</h2>
    <div id="def_base_display" class="base-stats">H-A-B-C-D-S</div>
    <select id="def_pokemon"><option value="">カスタム(手入力)</option></select>

    <label class="mega-toggle">
        <input type="checkbox" id="def_mega">
        <span>メガ進化</span>
    </label>

    <div class="grid">
        <div><div class="label">タイプ1</div><select id="def_type1"></select></div>
        <div><div class="label">タイプ2</div><select id="def_type2"><option value="">なし</option></select></div>
        <div><div class="label">HP実数値</div><input type="number" id="def_hp" value="175"></div>
        <div><div class="label">防御/特防 実数値</div><input type="number" id="def_stat" value="135"></div>
    </div>
</div>

<button id="calcBtn">DAMAGE CALCULATE</button>
<div id="result">ポケモンを選択してください</div>

<script>
const POKE_DB = {
    "メタグロス": [[80,135,130,95,90,70], [80,145,150,105,110,110], ["はがね","エスパー"], ["はがね","エスパー"]],
    "バンギラス": [[100,134,110,95,100,61], [100,164,150,95,120,71], ["いわ","あく"], ["いわ","あく"]],
    "ドリュウズ": [[110,135,60,50,65,88], [110,185,90,50,85,108], ["じめん","はがね"], ["じめん","はがね"]],
    "レックウザ": [[105,150,90,150,90,95], [105,180,100,180,100,115], ["ドラゴン","ひこう"], ["ドラゴン","ひこう"]],
    "ボーマンダ": [[95,135,80,110,80,100], [95,145,130,120,90,120], ["ドラゴン","ひこう"], ["ドラゴン","ひこう"]],
    "ガブリアス": [[108,130,95,80,85,102], [108,170,115,120,95,92], ["ドラゴン","じめん"], ["ドラゴン","じめん"]],
    "クチート": [[50,85,85,55,55,50], [50,105,125,55,95,50], ["はがね","フェアリー"], ["はがね","フェアリー"]],
    "バシャーモ": [[80,120,70,110,70,80], [80,160,80,130,80,100], ["ほのお","かくとう"], ["ほのお","かくとう"]],
    "リザードン": [[78,84,78,109,85,100], [78,104,78,159,115,100], ["ほのお","ひこう"], ["ほのお","ひこう"]]
};

const TYPES = ["ノーマル", "ほのお", "みず", "くさ", "でんき", "こおり", "かくとう", "どく", "じめん", "ひこう", "エスパー", "むし", "いわ", "ゴースト", "ドラゴン", "あく", "はがね", "フェアリー"];
const CHART = { "かくとう": {"ノーマル": 2, "こおり": 2, "いわ": 2, "あく": 2, "はがね": 2, "どく": 0.5, "ひこう": 0.5, "エスパー": 0.5, "むし": 0.5, "フェアリー": 0.5, "ゴースト": 0}, "ほのお": {"くさ": 2, "こおり": 2, "むし": 2, "はがね": 2, "ほのお": 0.5, "みず": 0.5, "いわ": 0.5, "ドラゴン": 0.5}, "みず": {"ほのお": 2, "じめん": 2, "いわ": 2, "みず": 0.5, "くさ": 0.5, "ドラゴン": 0.5}, "いわ": {"ほのお": 2, "こおり": 2, "ひこう": 2, "むし": 2, "かくとう": 0.5, "じめん": 0.5, "はがね": 0.5} };

const setup = () => {
    ['atk_type1', 'atk_type2', 'move_type', 'def_type1', 'def_type2'].forEach(id => {
        const s = document.getElementById(id);
        TYPES.forEach(t => {
            const opt = document.createElement('option'); opt.value = t; opt.textContent = t;
            if(t === "かくとう" && !id.includes('2')) opt.selected = true;
            s.appendChild(opt);
        });
    });
    ['atk_pokemon', 'def_pokemon'].forEach(id => {
        const s = document.getElementById(id);
        Object.keys(POKE_DB).forEach(name => {
            const opt = document.createElement('option'); opt.value = name; opt.textContent = name;
            s.appendChild(opt);
        });
    });
};
setup();

const updatePoke = (side) => {
    const name = document.getElementById(side + '_pokemon').value;
    const isMega = document.getElementById(side + '_mega').checked;
    const disp = document.getElementById(side + '_base_display');
    if(!name) return;
    
    const data = POKE_DB[name];
    const stats = isMega ? data[1] : data[0];
    const types = isMega ? data[3] : data[2];
    
    disp.textContent = stats.join(' - ');
    const isPhys = document.getElementById('move_cat').value === 'Physical';
    
    if(side === 'atk') {
        document.getElementById('atk_type1').value = types[0];
        document.getElementById('atk_type2').value = types[1] || "";
        document.getElementById('atk_stat').value = Math.floor(((isPhys?stats[1]:stats[3]) + 52) * 1.1);
    } else {
        document.getElementById('def_type1').value = types[0];
        document.getElementById('def_type2').value = types[1] || "";
        document.getElementById('def_hp').value = stats[0] + 75;
        document.getElementById('def_stat').value = (isPhys?stats[2]:stats[4]) + 20;
    }
};

['atk_pokemon','atk_mega','def_pokemon','def_mega','move_cat'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => updatePoke(id.startsWith('atk')?'atk':'def'));
});

document.getElementById('calcBtn').onclick = () => {
    const n = (id) => parseFloat(document.getElementById(id).value) || 0;
    const v = (id) => document.getElementById(id).value;
    const isChecked = (id) => document.getElementById(id).checked;

    let atkVal = n('atk_stat') * (n('atk_boost') >= 0 ? (2 + n('atk_boost')) / 2 : 2 / (2 + Math.abs(n('atk_boost'))));
    let defVal = n('def_stat');

    if(isChecked('weather_sand') && v('move_cat') === 'Special' && (v('def_type1') === 'いわ' || v('def_type2') === 'いわ')) defVal = Math.floor(defVal * 1.5);
    if(isChecked('weather_snow') && v('move_cat') === 'Physical' && (v('def_type1') === 'こおり' || v('def_type2') === 'こおり')) defVal = Math.floor(defVal * 1.5);

    let damage = Math.floor(Math.floor(Math.floor(Math.floor(2 * 50 / 5 + 2) * n('move_bp') * atkVal / defVal) / 50) + 2);
    if (isChecked('is_double')) damage = Math.floor(damage * 0.75);
    if (isChecked('weather_sun')) { if(v('move_type') === 'ほのお') damage = Math.floor(damage * 1.5); if(v('move_type') === 'みず') damage = Math.floor(damage * 0.5); }
    if (isChecked('weather_rain')) { if(v('move_type') === 'みず') damage = Math.floor(damage * 1.5); if(v('move_type') === 'ほのお') damage = Math.floor(damage * 0.5); }

    const stab = (v('atk_type1') === v('move_type') || v('atk_type2') === v('move_type')) ? 1.5 : 1;
    const getEff = (mt, dt) => (CHART[mt] && CHART[mt][dt] !== undefined) ? CHART[mt][dt] : 1;
    let effect = getEff(v('move_type'), v('def_type1')) * (v('def_type2') ? getEff(v('move_type'), v('def_type2')) : 1);

    const res = [];
    for (let i = 85; i <= 100; i++) res.push(Math.floor(Math.floor(Math.floor(damage * i / 100) * stab) * effect));

    const min = res[0], max = res[15], hp = n('def_hp') || 1;
    document.getElementById('result').innerHTML = `
        <div style="font-size:32px; font-weight:bold; color:#fff;">${min} 〜 ${max}</div>
        <div style="font-size:22px; color:var(--orange); font-weight:bold;">${((min/hp)*100).toFixed(1)}% 〜 ${((max/hp)*100).toFixed(1)}%</div>
        <div style="font-size:12px; color:#666; margin-top:10px;">Atk:${Math.floor(atkVal)} / Def:${Math.floor(defVal)} / HP:${hp}</div>
    `;
};
</script>
</body>
</html>
